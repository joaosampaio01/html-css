<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixar Fontes Externas</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Sofia&display=swap');

        @font-face {
            font-family: 'King Jack';
            src: url('fonts/King\ Jack\ Style_Shadow.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        h1{
            font-family: 'King Jack';
        
        }

        p{
            font-family: "Sofia", cursive;
        }
    </style>
          
</head>
<body>
    <h1>Fontes externas</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit inventore totam, pariatur possimus libero fuga qui omnis ipsa facilis aspernatur quo incidunt voluptatibus, vero temporibus delectus voluptatem culpa optio dolores.</p>
</body>
</html>
