<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Level e Inline-Level</title>
    <style>
        h1{
            background-color: darkgrey;
            height: 300px;
            width: 300px;

            
            border: 10px solid rgb(22, 36, 36);

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 10px outset salmon;
            }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding: 10px;
            
        }
    </style>
</head>
<body>
    <h1>Mexendo com caixas no HTML</h1>
    <p>Parágrafos também são exemplos de box-level, mas os<a href="#"> links são exemplos de caixa inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
