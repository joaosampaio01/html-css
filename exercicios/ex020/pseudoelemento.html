<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoelemento em CSS</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color:rgb(255, 0, 0);
            text-decoration: none;
            font-weight: bold;
            
        }
        
        a:visited {
            color: darkred;
        }

        a:hover {
            color:black;
            text-decoration: underline;
        }

        a:active{
            color:yellow;
        }
    
        .especial{
            background-color: rgb(226, 96, 96);
        }
        .especial::before{
            content: '⚞';
            color:rgb(0, 0, 0);
        }

        .especial::after{
            content: '⚟';
            color:black;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css/tree/master" target="_blank" class="especial">Repositório GitHub do Gustavo Guanabara</a></li>
        <li><a href="https://www.youtube.com" target="_blank" class="especial">Canal do youtube do Gustavo Guanabara</a></li>
        <li><a href="https://www.cursoemvideo.com/curso/curso-html5-e-css3-modulo-2-de-5-40-horas/aulas/modulo-2-2/modulos/capitulo-15-aula-04-pseudo-elementos-em-css/" target="_blank">Site do Curso  em video</a></li>
    </ul>
</body>
</html>
