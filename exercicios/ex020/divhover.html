<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
                   display: none;
        }

        div:hover > p {
            display: block;
            background-color: rgb(233, 13, 13);
            color: rgb(255, 255, 255);
            width:200px
        }
        div:hover {
            color:brown;
        }
    </style>
</head>
<body>
    <h1>Hover HTML</h1>
    <h2>Passe o mouse no texto abaixo</h2>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO....</p>
    </div>
    <p>Fim do exemplo</p>
</body>
</html>
